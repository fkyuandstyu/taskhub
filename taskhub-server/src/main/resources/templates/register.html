<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskHub - 註冊新帳號</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .register-card h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* 確保寬度包含內距 */
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-register:hover {
            background-color: #1557b0;
        }
        .footer-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #777;
        }
        .footer-link a {
            color: #1a73e8;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>建立 TaskHub 帳號</h2>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <div class="form-group">
            <label for="username">使用者名稱</label>
            <input type="text" id="username" th:field="*{username}" placeholder="請輸入帳號" required>
        </div>

        <div class="form-group">
            <label for="email">電子信箱</label>
            <input type="email" id="email" th:field="*{email}" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="password">密碼</label>
            <input type="password" id="password" th:field="*{password}" placeholder="請輸入密碼" required>
        </div>

        <button type="submit" class="btn-register">立即註冊</button>
    </form>

    <div class="footer-link">
        已有帳號？ <a href="/login">按此登入</a>
    </div>
</div>

</body>
</html>
